name: CI

on:
  pull_request:
    branches:
      - main
      - zou
  push:
    branches:
      - zou

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show Node.js version
        run: node --version

      - name: Run unit tests
        run: node --test
